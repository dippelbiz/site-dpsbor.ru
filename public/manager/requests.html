<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>DP SBOR — Заявки на склад</title>
<style>* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
.sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100%; background: #2c3e50; color: white; padding: 20px 0; }
.logo { padding: 0 20px 20px; font-size: 1.5rem; font-weight: bold; border-bottom: 1px solid #3e5a6b; margin-bottom: 20px; color: #28a745; }
.logo span { color: #ff8f00; }
.nav-item { padding: 12px 20px; display: flex; align-items: center; gap: 12px; color: #ecf0f1; text-decoration: none; }
.nav-item:hover, .nav-item.active { background: #28a745; color: white; }
.main-content { margin-left: 260px; padding: 20px; }
.header { background: white; padding: 15px 25px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
.logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
.card { background: white; border-radius: 10px; padding: 40px; text-align: center; color: #666; }
</style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">DP <span>SBOR</span></div>
        <a href="/manager/dashboard.html" class="nav-item">📊 Дашборд</a>
        <a href="/manager/orders.html" class="nav-item">📦 Заказы</a>
        <a href="/manager/warehouse.html" class="nav-item">🏪 Склад</a>
        <a href="/manager/requests.html" class="nav-item active">📋 Заявки</a>
        <a href="/manager/payments.html" class="nav-item">💰 Выплаты</a>
    </div>
    <div class="main-content">
        <div class="header"><h1>Заявки на склад</h1><button class="logout-btn" onclick="logout()">Выйти</button></div>
        <div class="card"><p>📋 Здесь будут заявки на перемещение товаров</p><p style="margin-top:10px">Функция в разработке</p></div>
    </div>
    <script>function logout(){localStorage.removeItem('manager_token');window.location.href='/manager/';}</script>
</body>
</html>
