<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP SBOR — Все чаты</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .sidebar-chats {
            width: 280px;
            background: white;
            border-right: 1px solid #ecf0f1;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 12px 15px;
            border-bottom: 1px solid #ecf0f1;
            background: #2c3e50;
            color: white;
        }
        .sidebar-header h2 {
            font-size: 16px;
        }
        .sidebar-header p {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 3px;
        }
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            padding: 10px 12px;
            border-bottom: 1px solid #ecf0f1;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-item:hover {
            background: #f8f9fa;
        }
        .chat-item.active {
            background: #e8f5e9;
            border-left: 3px solid #27ae60;
        }
        .chat-item.has-unread {
            background: #fff3e0;
        }
        .chat-item.completed {
            opacity: 0.5;
            background: #f5f5f5;
        }
        .chat-order {
            font-weight: bold;
            color: #2c3e50;
            font-size: 13px;
        }
        .chat-status {
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 8px;
            margin-left: 6px;
        }
        .chat-status.completed {
            background: #27ae60;
            color: white;
        }
        .chat-status.processing {
            background: #f39c12;
            color: white;
        }
        .chat-status.new {
            background: #3498db;
            color: white;
        }
        .chat-client {
            font-size: 11px;
            color: #7f8c8d;
            margin-top: 3px;
        }
        .chat-last-message {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-time {
            font-size: 9px;
            color: #95a5a6;
            float: right;
        }
        .chat-preview {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e9ecef;
            min-width: 0;
        }
        .chat-header {
            background: white;
            padding: 10px 15px;
            border-bottom: 1px solid #ecf0f1;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .chat-header h3 {
            color: #2c3e50;
            font-size: 14px;
        }
        .chat-header p {
            font-size: 11px;
            color: #7f8c8d;
            margin-top: 2px;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }
        .message {
            max-width: 80%;
            margin-bottom: 8px;
            padding: 6px 10px;
            border-radius: 8px;
            word-wrap: break-word;
            font-size: 12px;
        }
        .message.incoming {
            background: white;
            align-self: flex-start;
            border-left: 2px solid #3498db;
        }
        .message.outgoing {
            background: #3498db;
            color: white;
            align-self: flex-end;
        }
        .message-meta {
            font-size: 9px;
            margin-top: 3px;
            color: #7f8c8d;
        }
        .message.outgoing .message-meta {
            color: rgba(255,255,255,0.7);
        }
        .chat-input {
            background: white;
            padding: 10px;
            border-top: 1px solid #ecf0f1;
            display: flex;
            gap: 8px;
        }
        .chat-input textarea {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            resize: none;
            font-family: inherit;
            font-size: 12px;
            height: 50px;
        }
        .chat-input button {
            background: #28a745;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            align-self: flex-end;
        }
        .chat-input button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            font-size: 12px;
        }
        .no-chat-selected {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7f8c8d;
            font-size: 13px;
        }
        .order-completed-badge {
            background: #27ae60;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            display: inline-block;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="sidebar-chats">
        <div class="sidebar-header">
            <h2>💬 Чаты</h2>
            <p>Активные диалоги</p>
        </div>
        <div class="chats-list" id="chats-list">
            <div class="loading">Загрузка...</div>
        </div>
    </div>
    
    <div class="main-chat" id="main-chat">
        <div class="no-chat-selected">
            <p>Выберите диалог</p>
        </div>
    </div>

    <script>
        let currentOrderId = null;
        let currentRecipient = null;
        let currentOrderStatus = null;
        let pollInterval = null;
        
        function checkAuth() {
            const token = localStorage.getItem('manager_token');
            if (!token) { window.location.href = '/manager/'; return false; }
            return token;
        }
        
        async function loadChats() {
            const token = checkAuth();
            try {
                const response = await fetch('/api/manager/chats-list', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                renderChats(data.chats);
            } catch (err) {
                console.error('Error loading chats:', err);
            }
        }
        
        function renderChats(chats) {
            const container = document.getElementById('chats-list');
            if (!chats || chats.length === 0) {
                container.innerHTML = '<div class="loading">Нет активных диалогов</div>';
                return;
            }
            
            container.innerHTML = chats.map(chat => {
                let statusClass = '';
                let statusText = '';
                if (chat.status === 'completed') {
                    statusClass = 'completed';
                    statusText = '✅';
                } else if (chat.status === 'processing') {
                    statusClass = 'processing';
                    statusText = '📋';
                } else if (chat.status === 'new') {
                    statusClass = 'new';
                    statusText = '🆕';
                }
                
                return `
                    <div class="chat-item ${chat.hasUnread ? 'has-unread' : ''} ${chat.status === 'completed' ? 'completed' : ''}" 
                         onclick="loadChat(${chat.orderId})"
                         data-order-id="${chat.orderId}">
                        <div class="chat-preview">
                            <span class="chat-order">№${chat.orderNumber}</span>
                            <span class="chat-status ${statusClass}">${statusText}</span>
                            <span class="chat-time">${chat.lastMessageDate || ''}</span>
                        </div>
                        <div class="chat-client">${escapeHtml(chat.clientName)}</div>
                        <div class="chat-last-message">${escapeHtml(chat.lastMessage || 'Нет сообщений')}</div>
                    </div>
                `;
            }).join('');
        }
        
        async function loadChat(orderId) {
            const token = checkAuth();
            currentOrderId = orderId;
            
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.querySelector(`.chat-item[data-order-id="${orderId}"]`);
            if (activeItem) activeItem.classList.add('active');
            
            try {
                const response = await fetch(`/api/manager/order/${orderId}/chat`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                currentRecipient = data.recipient;
                currentOrderStatus = data.status;
                renderChatWindow(data);
            } catch (err) {
                console.error('Error loading chat:', err);
            }
        }
        
        function renderChatWindow(data) {
            const container = document.getElementById('main-chat');
            const channelName = getChannelName(currentRecipient?.channel);
            const isCompleted = data.status === 'completed';
            const isProcessing = data.status === 'processing';
            const canChat = isProcessing || data.status === 'new';
            
            container.innerHTML = `
                <div class="chat-header">
                    <h3>Заказ №${data.order_number}
                        ${isCompleted ? '<span class="order-completed-badge">✅ Завершен</span>' : ''}
                    </h3>
                    <p>👤 ${data.recipient?.name || 'Клиент'} • 📱 ${channelName}</p>
                </div>
                <div class="messages-container" id="messages-container">
                    ${renderMessages(data.messages)}
                </div>
                <div class="chat-input">
                    <textarea id="message-input" placeholder="${!canChat ? 'Чат доступен только для заказов в работе' : 'Введите сообщение...'}" rows="2" ${!canChat ? 'disabled' : ''}></textarea>
                    <button onclick="sendMessage()" ${!canChat ? 'disabled' : ''}>Отправить</button>
                </div>
            `;
            
            const messagesContainer = document.getElementById('messages-container');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            if (canChat) {
                document.getElementById('message-input').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }
        }
        
        function renderMessages(messages) {
            if (!messages || messages.length === 0) {
                return '<div class="loading">Нет сообщений</div>';
            }
            
            return messages.map(msg => {
                const date = new Date(msg.created_at);
                const formattedDate = date.toLocaleString('ru-RU', {
                    day: '2-digit',
                    month: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                const isOutgoing = msg.direction === 'outgoing';
                const senderName = isOutgoing ? 'Вы' : (msg.sender_name || 'Клиент');
                
                return `
                    <div class="message ${msg.direction}">
                        <div>${escapeHtml(msg.message_text)}</div>
                        <div class="message-meta">
                            ${senderName} • ${formattedDate}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        async function sendMessage() {
            if (currentOrderStatus !== 'processing' && currentOrderStatus !== 'new') {
                alert('Чат доступен только для заказов в работе');
                return;
            }
            
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;
            if (!currentRecipient?.id) {
                alert('Нет получателя');
                return;
            }
            
            const token = checkAuth();
            const sendBtn = document.querySelector('.chat-input button');
            sendBtn.disabled = true;
            sendBtn.textContent = 'Отправка...';
            
            try {
                const response = await fetch('/api/chat/send', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({
                        order_id: currentOrderId,
                        channel: currentRecipient.channel,
                        recipient_id: currentRecipient.id,
                        message_text: text
                    })
                });
                
                if (response.ok) {
                    input.value = '';
                    await loadChat(currentOrderId);
                } else {
                    const error = await response.json();
                    alert('Ошибка: ' + error.error);
                }
            } catch (err) {
                console.error('Send error:', err);
                alert('Ошибка при отправке');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Отправить';
            }
        }
        
        function getChannelName(channel) {
            const names = { 'telegram': 'Telegram', 'vk': 'ВК', 'whatsapp': 'WhatsApp' };
            return names[channel] || channel || '?';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function startPolling() {
            pollInterval = setInterval(() => {
                if (currentOrderId && document.hasFocus()) {
                    loadChat(currentOrderId);
                }
                loadChats();
            }, 5000);
        }
        
        if (checkAuth()) {
            loadChats();
            startPolling();
        }
        
        window.addEventListener('beforeunload', () => {
            if (pollInterval) clearInterval(pollInterval);
        });
    </script>
</body>
</html>
