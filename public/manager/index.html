<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вход — Панель управления</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #28a745;
            margin-bottom: 10px;
        }
        .logo span {
            color: #ff8f00;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .telegram-login {
            margin: 20px 0;
            min-height: 60px;
        }
        .error {
            color: #dc3545;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        .loading {
            display: none;
            margin-top: 15px;
            color: #666;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            width: 100%;
        }
        button:hover {
            background: #218838;
        }
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            .logo {
                font-size: 2rem;
            }
            h2 {
                font-size: 1.5rem;
            }
            button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">ДП <span>СБОР</span></div>
        <h2>Панель управления</h2>
        <p>Войдите через Telegram для доступа</p>
        
        <div id="telegram-login" class="telegram-login"></div>
        
        <div id="error" class="error"></div>
        <div id="loading" class="loading">Проверка доступа...</div>
        
        <button onclick="manualCheck()" style="background: #6c757d;">Проверить авторизацию</button>
    </div>

    <script>
        // Функция авторизации
        async function onTelegramAuth(user) {
            console.log('Telegram user:', user);
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            
            try {
                const response = await fetch('/api/manager/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegram_id: user.id,
                        name: user.first_name + (user.last_name ? ' ' + user.last_name : ''),
                        username: user.username
                    })
                });
                
                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok && data.success) {
                    localStorage.setItem('manager_token', data.token);
                    localStorage.setItem('manager_name', data.name);
                    localStorage.setItem('manager_role', data.role);
                    console.log('Redirecting to dashboard...');
                    window.location.href = '/manager/dashboard.html';
                } else {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').innerHTML = '❌ ' + (data.message || 'Доступ запрещён');
                }
            } catch (err) {
                console.error('Auth error:', err);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = '❌ Ошибка сервера: ' + err.message;
            }
        }
        
        // Ручная проверка (для отладки)
        async function manualCheck() {
            const token = localStorage.getItem('manager_token');
            if (token) {
                console.log('Token exists, checking...');
                try {
                    const response = await fetch('/api/manager/dashboard', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.ok) {
                        window.location.href = '/manager/dashboard.html';
                    } else {
                        alert('Токен недействителен, войдите заново');
                        localStorage.removeItem('manager_token');
                    }
                } catch (err) {
                    console.error('Check error:', err);
                }
            } else {
                alert('Нет токена, войдите через Telegram');
            }
        }
        
        // Глобальная функция для Telegram
        window.onTelegramAuth = onTelegramAuth;
        
        // Проверяем, есть ли уже токен
        const existingToken = localStorage.getItem('manager_token');
        if (existingToken) {
            console.log('Found existing token, checking...');
            manualCheck();
        }
    </script>
    
    <script async
        src="https://telegram.org/js/telegram-widget.js?22"
        data-telegram-login="dpsbor_site_bot"
        data-size="large"
        data-onauth="onTelegramAuth(user)"
        data-request-access="write">
    </script>
</body>
</html>
