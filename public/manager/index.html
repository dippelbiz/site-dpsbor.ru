<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Вход — Панель управления</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 28px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            transition: all 0.2s;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: bold;
            color: #28a745;
            margin-bottom: 12px;
        }
        .logo span {
            color: #ff8f00;
        }
        h2 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.6rem;
        }
        p {
            color: #666;
            margin-bottom: 28px;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .telegram-login {
            margin: 20px 0 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .telegram-login iframe {
            max-width: 100% !important;
            height: auto !important;
            display: block;
            margin: 0 auto !important;
        }
        .error {
            color: #dc3545;
            margin-top: 20px;
            font-size: 0.85rem;
            display: none;
            background: #fff0f0;
            padding: 10px;
            border-radius: 12px;
        }
        .loading {
            display: none;
            margin-top: 20px;
            color: #666;
            font-size: 0.85rem;
        }
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 20px;
                border-radius: 36px;
            }
            .logo {
                font-size: 1.9rem;
            }
            h2 {
                font-size: 1.4rem;
            }
            p {
                font-size: 0.85rem;
                margin-bottom: 24px;
            }
        }
        @media (max-width: 360px) {
            .login-card {
                padding: 28px 16px;
            }
            .logo {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">ДП <span>СБОР</span></div>
        <h2>Панель управления</h2>
        <p>Войдите через Telegram для доступа</p>
        
        <div id="telegram-login" class="telegram-login"></div>
        
        <div id="error" class="error"></div>
        <div id="loading" class="loading">Проверка доступа...</div>
    </div>

    <script>
        async function onTelegramAuth(user) {
            console.log('Telegram user:', user);
            
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            
            try {
                const response = await fetch('/api/manager/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegram_id: user.id,
                        name: user.first_name + (user.last_name ? ' ' + user.last_name : ''),
                        username: user.username
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    localStorage.setItem('manager_token', data.token);
                    localStorage.setItem('manager_name', data.name);
                    localStorage.setItem('manager_role', data.role);
                    window.location.href = '/manager/dashboard.html';
                } else {
                    loadingEl.style.display = 'none';
                    errorEl.style.display = 'block';
                    errorEl.innerHTML = '❌ ' + (data.message || 'Доступ запрещён');
                }
            } catch (err) {
                console.error('Auth error:', err);
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.innerHTML = '❌ Ошибка сервера: ' + err.message;
            }
        }
        
        async function checkExistingToken() {
            const token = localStorage.getItem('manager_token');
            if (token) {
                try {
                    const response = await fetch('/api/manager/dashboard', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.ok) {
                        window.location.href = '/manager/dashboard.html';
                    } else {
                        localStorage.removeItem('manager_token');
                    }
                } catch (err) {
                    console.error('Token check error:', err);
                }
            }
        }
        
        window.onTelegramAuth = onTelegramAuth;
        checkExistingToken();
    </script>
    
    <script async
        src="https://telegram.org/js/telegram-widget.js?22"
        data-telegram-login="dpsbor_site_bot"
        data-size="large"
        data-onauth="onTelegramAuth(user)"
        data-request-access="write">
    </script>
</body>
</html>
